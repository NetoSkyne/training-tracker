<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Training"/>
  <title>Training Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    body{background:#f5f5f7;min-height:100vh;padding-bottom:32px}
    button{cursor:pointer;border:none;outline:none}
    input{outline:none;border:none}
    .header{padding:max(16px,env(safe-area-inset-top)) 16px 12px;color:#fff}
    .view-toggle{display:flex;background:rgba(255,255,255,0.15);border-radius:12px;padding:4px;margin-top:12px}
    .view-btn{flex:1;padding:7px 0;border-radius:9px;font-size:13px;font-weight:600;background:transparent;color:#fff;transition:.2s}
    .view-btn.active{background:#fff}
    .day-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .day-tab{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;background:#f0f0f0;color:#555;transition:.2s}
    .week-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .week-btn{width:34px;height:34px;border-radius:50%;font-size:12px;font-weight:700;background:#e5e5ea;color:#555;transition:.2s}
    .week-btn.active{background:#1c1c1e;color:#fff}
    .banner{border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:12px;font-weight:500;border:1px solid}
    .card{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .card-header{padding:12px 14px 0}
    .ex-name{font-weight:700;font-size:14px;color:#1c1c1e;line-height:1.3}
    .ex-info{font-size:12px;color:#888;margin-top:2px}
    .alt-btn{background:#f5f5f7;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;color:#555;white-space:nowrap}
    .alt-box{background:#f9f9f9;border-radius:10px;padding:10px 12px;margin:8px 0;border:1px solid #efefef}
    .alt-label{font-size:11px;font-weight:700;color:#999;margin-bottom:8px;letter-spacing:.5px}
    .alt-chips{display:flex;flex-wrap:wrap;gap:6px}
    .alt-chip{background:#f5f5f7;border:1px solid #e5e5ea;border-radius:20px;padding:5px 12px;font-size:12px;color:#444}
    .sets-wrap{padding:8px 14px 14px}
    .set-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .set-row:last-child{margin-bottom:0}
    .set-label{font-size:12px;color:#aaa;width:52px;flex-shrink:0}
    .set-input{width:100%;padding:10px 12px;border-radius:10px;font-size:15px;border:2px solid #e5e5ea;background:#fff;-webkit-appearance:none;appearance:none}
    .set-input.up{border-color:#22c55e;background:#f0fdf4}
    .set-input.down{border-color:#ef4444;background:#fef2f2}
    .arrow{width:18px;text-align:center;font-size:14px}
    /* History */
    .hist-table{width:100%;border-collapse:collapse;font-size:11px}
    .hist-table th{padding:8px 6px;font-weight:600;color:#999;text-align:center}
    .hist-table th.sticky{text-align:left;padding:8px 12px;position:sticky;left:0;background:#f9f9f9}
    .hist-table td{padding:8px 4px;text-align:center;color:#ddd}
    .hist-table td.sticky{padding:8px 12px;font-weight:600;color:#333;position:sticky;left:0;background:#fff;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .hist-table td.has-val{color:#333;font-weight:500}
    .hist-table td.improved{color:#16a34a;font-weight:700}
    .hist-table tr{border-top:1px solid #f0f0f0}
    .overflow-x{overflow-x:auto}
    .hist-day-header{padding:10px 14px}
    .hist-day-title{color:#fff;font-weight:700;font-size:14px}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const PROGRAM = {
  "Upper A": {
    emoji:"🔵",color:"#2563eb",light:"#eff6ff",border:"#bfdbfe",
    exercises:[
      {name:"Développé couché haltères",sets:4,reps:"6-8",rest:"2-3 min",alternatives:["Développé couché barre","Développé couché machine","Push-up lestés","Dips lestés"]},
      {name:"Développé incliné haltères",sets:3,reps:"8-10",rest:"90s",alternatives:["Développé incliné barre","Développé incliné machine","Câble incliné fly"]},
      {name:"Rowing barre (Yates row)",sets:3,reps:"8-10",rest:"90s",alternatives:["Rowing haltère unilatéral","Rowing machine Hammer","Rowing câble assis"]},
      {name:"Élévations latérales câble",sets:3,reps:"12-15",rest:"60s",alternatives:["Élévations latérales haltères","Machine épaules latéral","Élastiques latéral"]},
      {name:"Curl haltères (poignet neutre)",sets:2,reps:"10-12",rest:"60s",alternatives:["Curl marteau","Curl barre EZ","Curl câble"]},
      {name:"Triceps poulie haute",sets:2,reps:"10-12",rest:"60s",alternatives:["Triceps corde poulie","Kickback haltère","Dips banc"]}
    ]
  },
  "Lower A": {
    emoji:"🟢",color:"#16a34a",light:"#f0fdf4",border:"#bbf7d0",
    exercises:[
      {name:"Squat barre",sets:4,reps:"6-8",rest:"2-3 min",alternatives:["Goblet squat","Squat hack machine","Presse à cuisses"]},
      {name:"Presse à cuisses",sets:3,reps:"10-12",rest:"90s",alternatives:["Squat hack machine","Leg press 45°","Squat Bulgarian split"]},
      {name:"Fentes haltères",sets:3,reps:"10/jambe",rest:"90s",alternatives:["Fentes barre","Fentes marchées","Step-up haltères"]},
      {name:"Leg curl couché",sets:3,reps:"10-12",rest:"90s",alternatives:["Leg curl assis","Nordic curl","Good morning"]},
      {name:"Mollets debout",sets:4,reps:"12-15",rest:"60s",alternatives:["Mollets machine debout","Mollets à la presse","Mollets haltères unilatéral"]},
      {name:"Gainage planche",sets:3,reps:"45 sec",rest:"45s",alternatives:["Mountain climber","Hollow body hold","Ab wheel"]}
    ]
  },
  "Upper B": {
    emoji:"🔴",color:"#dc2626",light:"#fef2f2",border:"#fecaca",
    exercises:[
      {name:"Traction assistée machine",sets:4,reps:"6-8",rest:"2 min",alternatives:["Lat pulldown prise large","Assisted pull-up élastique","Traction négative excentrique"]},
      {name:"Lat pulldown prise large",sets:3,reps:"8-10",rest:"90s",alternatives:["Lat pulldown prise serrée","Straight arm pulldown","Pull-over câble"]},
      {name:"Rowing câble assis",sets:3,reps:"10-12",rest:"90s",alternatives:["Rowing haltère unilatéral","Rowing machine Hammer","TRX row"]},
      {name:"Développé militaire haltères",sets:3,reps:"8-10",rest:"90s",alternatives:["Développé militaire barre","Arnold press","Push press"]},
      {name:"Face pull câble",sets:3,reps:"15",rest:"60s",alternatives:["Oiseau haltères rear delt","Reverse pec deck","Band pull apart"]},
      {name:"Curl marteau",sets:2,reps:"10-12",rest:"60s",alternatives:["Curl haltères supination","Curl câble","Curl barre EZ"]}
    ]
  },
  "Lower B": {
    emoji:"🟡",color:"#d97706",light:"#fffbeb",border:"#fde68a",
    exercises:[
      {name:"Soulevé de terre roumain",sets:4,reps:"8-10",rest:"2 min",alternatives:["SDT jambes tendues","Good morning","Hip hinge câble"]},
      {name:"Hip thrust barre",sets:3,reps:"10-12",rest:"90s",alternatives:["Hip thrust haltère","Glute bridge sol","Hip thrust machine"]},
      {name:"Leg curl assis",sets:3,reps:"10-12",rest:"90s",alternatives:["Leg curl couché","Nordic curl","SDT roumain unilatéral"]},
      {name:"Leg extension",sets:3,reps:"12-15",rest:"60s",alternatives:["Sissy squat","Presse pied haut","Step-up lent"]},
      {name:"Mollets assis",sets:4,reps:"12-15",rest:"60s",alternatives:["Mollets machine debout","Mollets à la presse","Mollets haltères"]},
      {name:"Ab wheel",sets:3,reps:"10-12",rest:"60s",alternatives:["Crunch câble","Hanging knee raise","Dragon flag débutant"]}
    ]
  }
};

const DAYS = Object.keys(PROGRAM);
const MAX_WEEKS = 12;
const SK = "training_tracker_v1";

// State
let state = {
  view: "tracker",
  activeDay: DAYS[0],
  week: 1,
  openAlt: null,
  perfs: JSON.parse(localStorage.getItem(SK) || "{}")
};

function savePerfs() { localStorage.setItem(SK, JSON.stringify(state.perfs)); }
function pk(d,w,ei,si){ return `${d}|${w}|${ei}|${si}`; }
function getPerf(d,w,ei,si){ return state.perfs[pk(d,w,ei,si)] || ""; }
function getPrev(d,w,ei,si){
  for(let pw=w-1;pw>=1;pw--){
    const v=state.perfs[pk(d,pw,ei,si)];
    if(v) return {val:v,week:pw};
  } return null;
}

function render(){
  const {view,activeDay,week,openAlt} = state;
  const prog = PROGRAM[activeDay];

  const headerHtml = `
    <div class="header" style="background:${prog.color}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:20px;font-weight:700">💪 Training Tracker</div>
          <div style="font-size:12px;opacity:.8">Upper / Lower — 12 semaines</div>
        </div>
      </div>
      <div class="view-toggle">
        <button class="view-btn ${view==='tracker'?'active':''}" style="${view==='tracker'?'color:'+prog.color:''}" onclick="setView('tracker')">📋 Séance</button>
        <button class="view-btn ${view==='history'?'active':''}" style="${view==='history'?'color:'+prog.color:''}" onclick="setView('history')">📈 Historique</button>
      </div>
    </div>`;

  const dayTabsHtml = `<div class="day-tabs">${DAYS.map(d=>`
    <button class="day-tab" style="${d===activeDay?'background:'+PROGRAM[d].color+';color:#fff':''}" onclick="setDay('${d}')">${PROGRAM[d].emoji} ${d}</button>
  `).join('')}</div>`;

  let mainHtml = '';

  if(view === 'tracker'){
    const weekBtns = `<div>
      <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px">SEMAINE</div>
      <div class="week-btns">${Array.from({length:MAX_WEEKS},(_,i)=>`
        <button class="week-btn ${i+1===week?'active':''}" onclick="setWeek(${i+1})">${i+1}</button>
      `).join('')}</div>
    </div>`;

    const banner = `<div class="banner" style="background:${prog.light};border-color:${prog.border};color:${prog.color}">
      Séance ${activeDay} · Semaine ${week} · ${prog.exercises.length} exercices
    </div>`;

    const exercises = prog.exercises.map((ex,ei)=>{
      const altKey = `${activeDay}-${ei}`;
      const isOpen = openAlt === altKey;
      const altBox = isOpen ? `<div class="alt-box">
        <div class="alt-label">EXERCICES ÉQUIVALENTS</div>
        <div class="alt-chips">${ex.alternatives.map(a=>`<span class="alt-chip">${a}</span>`).join('')}</div>
      </div>` : '';

      const sets = Array.from({length:ex.sets},(_,si)=>{
        const val = getPerf(activeDay,week,ei,si);
        const prev = getPrev(activeDay,week,ei,si);
        const up = prev && val && parseFloat(val) > parseFloat(prev.val);
        const down = prev && val && parseFloat(val) < parseFloat(prev.val);
        const placeholder = prev ? `S${prev.week}: ${prev.val}kg` : "0 kg";
        return `<div class="set-row">
          <div class="set-label">Série ${si+1}</div>
          <input class="set-input ${up?'up':down?'down':''}" type="number" inputmode="decimal" step="0.5"
            placeholder="${placeholder}" value="${val}"
            oninput="setPerf('${activeDay}',${week},${ei},${si},this.value)"/>
          <div class="arrow">${up?'↑':down?'↓':''}</div>
        </div>`;
      }).join('');

      return `<div class="card">
        <div class="card-header">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div style="flex:1;padding-right:8px">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-info">${ex.sets} séries · ${ex.reps} reps · ${ex.rest}</div>
            </div>
            <button class="alt-btn" onclick="toggleAlt('${altKey}')">🔄 Alt. ${isOpen?'▲':'▼'}</button>
          </div>
          ${altBox}
        </div>
        <div class="sets-wrap">${sets}</div>
      </div>`;
    }).join('');

    mainHtml = weekBtns + banner + exercises;
  }

  if(view === 'history'){
    mainHtml = DAYS.map(dayName=>{
      const d = PROGRAM[dayName];
      const rows = d.exercises.map((ex,ei)=>{
        const cells = Array.from({length:MAX_WEEKS},(_,wi)=>{
          const vals = Array.from({length:ex.sets},(_,si)=>getPerf(dayName,wi+1,ei,si)).filter(Boolean).map(Number);
          const prevVals = wi>0 ? Array.from({length:ex.sets},(_,si)=>getPerf(dayName,wi,ei,si)).filter(Boolean).map(Number) : [];
          const cur = vals.length>0 ? Math.max(...vals) : null;
          const prev = prevVals.length>0 ? Math.max(...prevVals) : null;
          const up = cur && prev && cur > prev;
          const cls = cur ? (up?'improved':'has-val') : '';
          return `<td class="${cls}">${cur||'—'}</td>`;
        }).join('');
        return `<tr><td class="sticky">${ex.name}</td>${cells}</tr>`;
      }).join('');

      const headers = Array.from({length:MAX_WEEKS},(_,i)=>`<th>S${i+1}</th>`).join('');

      return `<div class="card" style="margin-bottom:16px">
        <div class="hist-day-header" style="background:${d.color}">
          <div class="hist-day-title">${d.emoji} ${dayName}</div>
        </div>
        <div class="overflow-x">
          <table class="hist-table">
            <thead><tr><th class="sticky">Exercice</th>${headers}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('app').innerHTML = `
    ${headerHtml}
    <div style="padding:16px 16px 0">
      ${dayTabsHtml}
      ${mainHtml}
    </div>`;
}

// Actions
function setView(v){ state.view=v; render(); }
function setDay(d){ state.activeDay=d; state.openAlt=null; render(); }
function setWeek(w){ state.week=w; render(); }
function toggleAlt(k){ state.openAlt = state.openAlt===k ? null : k; render(); }
function setPerf(d,w,ei,si,val){
  state.perfs[pk(d,w,ei,si)] = val;
  savePerfs();
  // update just the input styling without full re-render
  const prev = getPrev(d,w,ei,si);
  const inp = document.querySelectorAll('.set-input')[ei * PROGRAM[d].exercises[0].sets + si];
  // just re-render for simplicity
  render();
}

render();
</script>
</body>
</html>
